name: leadgen daily refresh

on:
  schedule:
    - cron: "0 8 * * *"   # 08:00 UTC daily
  workflow_dispatch:
    inputs:
      since_days:
        description: "Look-back window for sources (days)"
        required: false
        default: "45"
      enrich_budget:
        description: "Max leads to enrich this run (0 = unlimited)"
        required: false
        default: "900"
      reenrich:
        description: "Force re-enrichment on every lead"
        type: boolean
        required: false
        default: false

permissions:
  contents: write

concurrency:
  group: leadgen
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: leadgen/pyproject.toml

      - name: Install leadgen
        working-directory: leadgen
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run leadgen
        working-directory: leadgen
        env:
          OPENAI_API_KEY:        ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          ADZUNA_APP_ID:         ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY:        ${{ secrets.ADZUNA_APP_KEY }}
          # Single upload endpoint; run.py posts each niche as ?niche=<key>.
          # Website wiring is pending — unset means the run writes local JSON
          # and skips the upload cleanly.
          LEADS_UPLOAD_URL:      ${{ vars.LEADS_UPLOAD_URL }}
          LEADS_UPLOAD_API_KEY:  ${{ secrets.LEADS_UPLOAD_API_KEY }}
          GEMINI_MIN_INTERVAL_S: "0.7"
          SINCE_DAYS:            ${{ inputs.since_days }}
          ENRICH_BUDGET:         ${{ inputs.enrich_budget }}
          REENRICH:              ${{ inputs.reenrich }}
        run: |
          args=("--upload" "--enrich-budget" "${ENRICH_BUDGET:-900}")
          if [[ -n "$SINCE_DAYS" ]]; then
            args+=("--since-days" "$SINCE_DAYS")
          fi
          if [[ "$REENRICH" == "true" ]]; then
            args+=("--reenrich")
          fi
          python -m leadgen.run "${args[@]}"

      - name: Commit updated DB
        if: success()
        run: |
          git config user.name  "leadgen-cron[bot]"
          git config user.email "leadgen-cron[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain leadgen/data/leads.db)" ]]; then
            git pull --rebase --autostash origin main || true
            git add leadgen/data/leads.db
            git commit -m "leadgen cron: nightly lead refresh ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "No changes to commit"
          fi
