name: Bookkeeping lead refresh

# The upload endpoint (api/upload-bookkeeping-leads) must be DEPLOYED on the
# website before enabling the schedule below. --upload runs with the URL set,
# so an undeployed endpoint fails the run (no data is lost: bookkeeping is
# stateless and its JSON is gitignored/served from Blob). To activate the daily
# cron: uncomment the schedule block once the endpoint responds.
on:
  schedule:
    - cron: "30 8 * * *"   # 08:30 UTC daily — offset from cfo-leads (08:00) to avoid overlap.
  workflow_dispatch:
    inputs:
      limit:
        description: "Per-run candidate cap (empty = no cap; e.g. 5 for a quick smoke)"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: bookkeeping-leads
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: cfo_pipeline/pyproject.toml

      - name: Install pipeline
        working-directory: cfo_pipeline
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run bookkeeping pipeline
        working-directory: cfo_pipeline
        env:
          # Bookkeeping scrapes public job boards (jobspy) — no LLM / Apollo
          # keys needed for the run itself. Reuses LEADS_UPLOAD_API_KEY (same
          # Bearer secret as the other pipelines — different blob key).
          BOOKKEEPING_UPLOAD_URL:     https://www.ishaangpta.com/api/upload-bookkeeping-leads
          BOOKKEEPING_UPLOAD_API_KEY: ${{ secrets.LEADS_UPLOAD_API_KEY }}
          LIMIT:                      ${{ inputs.limit }}
        run: |
          args=("--upload")
          if [[ -n "$LIMIT" ]]; then
            args+=("--limit" "$LIMIT")
          fi
          python -m cfo_pipeline.bookkeeping_run "${args[@]}"
